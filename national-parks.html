<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>National Parks - Nicole Mulvey</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container wide-container">
        <header>
            <div class="header-content">
                <div class="logo">
                    <a href="index.html">N.M.</a>
                </div>

                <nav>
                    <a href="background.html">Background</a>
                    <a href="projects.html">Projects</a>
                    <a href="experience.html">Experience</a>
                    <a href="awards.html">Awards</a>
                    <a href="misc.html" class="active">Misc</a>
                </nav>
            </div>
        </header>

        <main>
            <section>
                <h2 class="section-title">National Parks I’ve Visited</h2>

                <p class="page-intro">
                    One of my long-term goals is to visit every national park in the United States.
                    This is a running list of the parks I’ve visited so far.
                </p>

                <div class="misc-card">
                    <h3>Visited Parks</h3>
                    <div class="misc-meta" id="parks-count"></div>
                    <ul class="parks-list plain-parks-list" id="parks-list"></ul>
                </div>
            </section>
        </main>

        <footer>
            <p>© 2026 Nicole Mulvey. Built with care.</p>
        </footer>
    </div>

    <script>
        const visitedParks = [
            "Arches",
            "Bryce Canyon",
            "Capitol Reef",
            "Channel Islands",
            "Death Valley",
            "Grand Canyon",
            "Joshua Tree",
            "Kings Canyon",
            "Petrified Forest",
            "Pinnacles",
            "Redwood",
            "Sequoia",
            "White Sands",
            "Yosemite",
            "Zion"
        ];

        const parksList = document.getElementById("parks-list");
        const parksCount = document.getElementById("parks-count");

        const parkWord = visitedParks.length === 1 ? "park" : "parks";
        parksCount.textContent = `${visitedParks.length} ${parkWord} visited`;

        visitedParks.forEach(park => {
            const li = document.createElement("li");
            li.textContent = park;
            parksList.appendChild(li);
        });
    </script>
</body>
</html>
